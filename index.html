<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martial Arts Combo Generator</title>
    <style>
        :root {
            --bg-color: #91ad8c;
            --font-color: #02001c;
            --btn-bg: #02001c;
            --btn-text: #91ad8c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--font-color);
            font-family: Georgia, 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        #menu-view,
        #combo-view {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        button {
            width: 100%;
            padding: 1.5rem;
            font-size: 2rem;
            font-family: inherit;
            color: var(--btn-text);
            background-color: var(--btn-bg);
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        #combo-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .strike-item {
            font-size: 2.5rem;
            text-align: center;
            font-weight: bold;
            line-height: 1.2;
        }

        @media (max-width: 480px) {
            button {
                font-size: 1.5rem;
                padding: 1.2rem;
            }

            .strike-item {
                font-size: 1.8rem;
            }
        }

        #back-btn {
            background-color: transparent;
            color: var(--font-color);
            border: 3px solid var(--font-color);
            font-weight: bold;
        }

        #back-btn:hover {
            background-color: var(--font-color);
            color: var(--bg-color);
        }
    </style>
</head>

<body>

    <div id="menu-view">
        <!-- Buttons 2 through 10 will be generated here -->
    </div>

    <div id="combo-view" class="hidden">
        <div id="combo-list"></div>
        <button id="back-btn">Back</button>
    </div>

    <script>
        const strikes = [
            "Jab (left)",
            "Cross (right)",
            "Hook (left)",
            "Right Hook (right)",
            "Body Cross (right)",
            "Ridge Hand (left)",
            "Ridge Hand (right)",
            "Round Kick (front)",
            "Rear Kick (rear)",
            "Side Kick (front)",
            "Side Kick (rear)",
            "Back Kick (front)",
            "Back Kick (rear)"
        ];

        const menuView = document.getElementById('menu-view');
        const comboView = document.getElementById('combo-view');
        const comboList = document.getElementById('combo-list');
        const backBtn = document.getElementById('back-btn');

        // Generate menu buttons
        for (let i = 2; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.addEventListener('click', () => generateCombo(i));
            menuView.appendChild(btn);
        }

        function generateCombo(count) {
            comboList.innerHTML = '';
            let lastStrike = null;
            const selectedStrikes = [];

            const getStrikeType = (strike) => {
                if (strike.includes('(front)')) return 'front';
                if (strike.includes('(rear)')) return 'rear';
                return 'neutral';
            };

            const isSideKick = (strike) => strike.toLowerCase().includes('side kick');

            for (let i = 0; i < count; i++) {
                let availableStrikes = strikes.filter(strike => {
                    // Rule: Don't repeat any strikes back to back
                    if (strike === lastStrike) return false;

                    // Rule: if there's a side kick in the combo, it needs to be the first strike
                    // This implies index 0 can be a side kick, but index > 0 cannot.
                    if (i > 0 && isSideKick(strike)) return false;

                    if (lastStrike) {
                        const lastType = getStrikeType(lastStrike);
                        const currentType = getStrikeType(strike);

                        // Rule: no rear kicks in a row
                        if (lastType === 'rear' && currentType === 'rear') return false;

                        // Rule: no front kicks in a row
                        if (lastType === 'front' && currentType === 'front') return false;
                    }

                    return true;
                });

                // Fallback: if somehow no strikes are available (shouldn't happen with this set), 
                // pick any strike except the last one to avoid infinite loop or crash
                if (availableStrikes.length === 0) {
                    availableStrikes = strikes.filter(s => s !== lastStrike && !isSideKick(s));
                }

                const randomStrike = availableStrikes[Math.floor(Math.random() * availableStrikes.length)];
                selectedStrikes.push(randomStrike);
                lastStrike = randomStrike;

                const strikeDiv = document.createElement('div');
                strikeDiv.className = 'strike-item';
                strikeDiv.textContent = randomStrike;
                comboList.appendChild(strikeDiv);
            }

            menuView.classList.add('hidden');
            comboView.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        backBtn.addEventListener('click', () => {
            comboView.classList.add('hidden');
            menuView.classList.remove('hidden');
            window.scrollTo(0, 0);
        });
    </script>
</body>

</html>
