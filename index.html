<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martial Arts Combo & Drills</title>
    <style>
        :root {
            --bg-color: #91ad8c;
            --font-color: #02001c;
            --btn-bg: #02001c;
            --btn-text: #91ad8c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--font-color);
            font-family: Georgia, 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        #home-view,
        #menu-view,
        #combo-view,
        #drill-view {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        button {
            width: 100%;
            padding: 1.5rem;
            font-size: 2rem;
            font-family: inherit;
            color: var(--btn-text);
            background-color: var(--btn-bg);
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        #combo-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .strike-item,
        #drill-text {
            font-size: 2.5rem;
            text-align: center;
            font-weight: bold;
            line-height: 1.2;
        }

        #drill-text {
            font-size: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            button {
                font-size: 1.5rem;
                padding: 1.2rem;
            }

            .strike-item,
            #drill-text {
                font-size: 1.8rem;
            }

            #drill-text {
                font-size: 2.5rem;
            }
        }

        .back-btn {
            background-color: transparent;
            color: var(--font-color);
            border: 3px solid var(--font-color);
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: var(--font-color);
            color: var(--bg-color);
        }
    </style>
</head>

<body>

    <div id="home-view">
        <button id="nav-combos">Combos</button>
        <button id="nav-drills">Drills</button>
    </div>

    <div id="menu-view" class="hidden">
        <!-- Buttons 2 through 10 will be generated here -->
        <button class="back-btn" id="menu-back-btn">Back</button>
    </div>

    <div id="combo-view" class="hidden">
        <div id="combo-list"></div>
        <button class="back-btn" id="combo-back-btn">Back</button>
    </div>

    <div id="drill-view" class="hidden">
        <div id="drill-text">Ready?</div>
        <button class="back-btn" id="drill-back-btn">Back</button>
    </div>

    <script>
        const strikes = [
            "Jab (left)", "Cross (right)", "Hook (left)", "Right Hook (right)",
            "Body Cross (right)", "Ridge Hand (left)", "Ridge Hand (right)",
            "Round Kick (front)", "Rear Kick (rear)", "Side Kick (front)",
            "Side Kick (rear)", "Back Kick (front)", "Back Kick (rear)",
            "Block (left)", "Block (right)"
        ];

        const drillOptions = ["trees", "fence", "rock"];

        // Views
        const homeView = document.getElementById('home-view');
        const menuView = document.getElementById('menu-view');
        const comboView = document.getElementById('combo-view');
        const drillView = document.getElementById('drill-view');

        // Logic Containers
        const comboList = document.getElementById('combo-list');
        const drillText = document.getElementById('drill-text');

        // Nav Buttons
        document.getElementById('nav-combos').addEventListener('click', () => showView(menuView));
        document.getElementById('nav-drills').addEventListener('click', startDrills);

        // Back Buttons
        document.getElementById('menu-back-btn').addEventListener('click', () => showView(homeView));
        document.getElementById('combo-back-btn').addEventListener('click', () => showView(menuView));
        document.getElementById('drill-back-btn').addEventListener('click', stopDrills);

        function showView(view) {
            [homeView, menuView, comboView, drillView].forEach(v => v.classList.add('hidden'));
            view.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // Generate menu buttons for Combos
        for (let i = 2; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.addEventListener('click', () => generateCombo(i));
            // Insert before the back button
            menuView.insertBefore(btn, document.getElementById('menu-back-btn'));
        }

        function generateCombo(count) {
            comboList.innerHTML = '';
            let lastStrike = null;

            const getStrikeType = (strike) => {
                if (strike.includes('(front)')) return 'front';
                if (strike.includes('(rear)')) return 'rear';
                if (strike.includes('Round Kick')) return 'round';
                return 'neutral';
            };

            const isSideKick = (strike) => strike.toLowerCase().includes('side kick');

            for (let i = 0; i < count; i++) {
                let availableStrikes = strikes.filter(strike => {
                    if (strike === lastStrike) return false;
                    if (i > 0 && isSideKick(strike)) return false;
                    if (lastStrike) {
                        const lastType = getStrikeType(lastStrike);
                        const currentType = getStrikeType(strike);
                        if (lastType === 'rear' && currentType === 'rear') return false;
                        if (lastType === 'front' && currentType === 'front') return false;
                        if (lastType === 'rear' && currentType === 'round') return false;
                        if (lastType === 'round' && currentType === 'rear') return false;
                    }
                    return true;
                });

                if (availableStrikes.length === 0) {
                    availableStrikes = strikes.filter(s => s !== lastStrike && !isSideKick(s));
                }

                const randomStrike = availableStrikes[Math.floor(Math.random() * availableStrikes.length)];
                lastStrike = randomStrike;

                const strikeDiv = document.createElement('div');
                strikeDiv.className = 'strike-item';
                strikeDiv.textContent = randomStrike;
                comboList.appendChild(strikeDiv);
            }

            showView(comboView);
        }

        // Drill Logic
        let drillInterval = null;
        let drillTimeout = null;
        let lastDrillOption = null;

        function startDrills() {
            showView(drillView);
            lastDrillOption = null;
            runDrillCycle();

            // Total 2-minute session
            drillTimeout = setTimeout(() => {
                stopDrills();
            }, 120000);

            // Change every 15 seconds
            drillInterval = setInterval(runDrillCycle, 15000);
        }

        function runDrillCycle() {
            let available = drillOptions.filter(opt => opt !== lastDrillOption);
            const next = available[Math.floor(Math.random() * available.length)];
            drillText.textContent = next;
            lastDrillOption = next;
        }

        function stopDrills() {
            clearInterval(drillInterval);
            clearTimeout(drillTimeout);
            showView(homeView);
            drillText.textContent = "Ready?";
        }
    </script>
</body>

</html>
